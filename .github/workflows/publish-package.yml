name: Publish Package

on:
  push:
    tags:
      - "packages/electrobun-vite-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/packages/electrobun-vite-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install Dependencies
        run: npm install --prefer-offline
        working-directory: packages/electrobun-vite

      - name: Build Package
        run: bun run build
        working-directory: packages/electrobun-vite

      - name: Publish to npm
        run: npm publish
        working-directory: packages/electrobun-vite
