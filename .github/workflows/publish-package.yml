name: Publish Package

on:
  push:
    tags:
      - "packages/electrobun-vite-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/packages/electrobun-vite-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to npm
        run: npm publish
        working-directory: packages/electrobun-vite
