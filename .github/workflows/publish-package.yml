name: Publish Package

on:
  push:
    tags:
      - "packages/electrobun-vite-v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/packages/electrobun-vite-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          registry-url: https://npm.pkg.github.com
          scope: "@nova-infra"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build Package
        run: bun run build
        working-directory: packages/electrobun-vite

      - name: Publish to GitHub Packages
        run: npm publish
        working-directory: packages/electrobun-vite
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
