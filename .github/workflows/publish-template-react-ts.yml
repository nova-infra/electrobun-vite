name: Publish Template React TS

on:
  push:
    tags:
      - "templates/react-ts-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/templates/react-ts-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck Template
        run: bun run typecheck
        working-directory: templates/react-ts

      - name: Publish Template to npm
        run: npm publish
        working-directory: templates/react-ts
