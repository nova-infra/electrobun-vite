name: Publish Template React TS

on:
  push:
    tags:
      - "templates/react-ts-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/templates/react-ts-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Node for Trusted Publishing
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install --ignore-scripts --no-package-lock
        working-directory: templates/react-ts

      - name: Publish Template to npm
        run: npm publish --provenance --access public
        working-directory: templates/react-ts
