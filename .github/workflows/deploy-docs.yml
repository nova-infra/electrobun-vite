name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_BASE_PATH: /electrobun-vite/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Configure GitHub Packages auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > .npmrc
          echo "@nova-infra:registry=https://npm.pkg.github.com" >> .npmrc

      - name: Install Dependencies
        run: |
          node -e "const fs=require('fs'),p=JSON.parse(fs.readFileSync('package.json','utf8')); p.workspaces=['apps/docs','packages/electrobun-vite']; fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
          bun install --ignore-scripts

      - name: Build Package
        run: bun run build:package

      - name: Build Docs
        run: bun run build:docs

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
